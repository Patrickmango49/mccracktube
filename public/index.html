<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕄𝕔ℂ𝕣𝕒𝕔𝕜Tube - Watch Videos</title>
  <meta name="description" content="𝕄𝕔ℂ𝕣𝕒𝕔𝕜Tube - Your dark-mode video destination." />
  <meta property="og:title" content="𝕄𝕔ℂ𝕣𝕒𝕔𝕜Tube" />
  <meta property="og:description" content="Your dark-mode video destination." />
  <meta property="og:type" content="website" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #121212;
      --border: #262626;
      --text: #ffffff;
      --muted: #a3a3a3;
      --danger: #ff6b6b;
      --focus: #7aa2ff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      line-height: 1.4;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1a1a1a;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 10px 16px;
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      flex-shrink: 0;
      font-family: serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: -0.5px;
      text-decoration: none;
      transition: opacity .2s;
    }
    .logo:hover { opacity: 0.8; }

    .search-form {
      flex: 1;
      min-width: 240px;
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,.35));
    }

    .search-input {
      flex: 1;
      height: 42px;
      padding: 0 16px;
      background: var(--surface-2);
      border: 1px solid #313131;
      border-right: none;
      border-radius: 999px 0 0 999px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: #7a7a7a; }
    .search-input:focus {
      border-color: var(--focus);
      box-shadow: inset 0 0 0 1px var(--focus);
    }

    .search-btn {
      height: 42px;
      padding: 0 20px;
      background: #222;
      border: 1px solid #313131;
      border-radius: 0 999px 999px 0;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .1s;
    }
    .search-btn:hover { background: #333; }
    .search-btn:active { transform: translateY(1px); }
    .search-btn:focus-visible, .clear-btn:focus-visible, .video-card:focus-visible, .logo:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 16px 28px;
    }

    .player-wrap {
      margin-bottom: 22px;
      border: 1px solid var(--border);
      background: #0f0f0f;
      border-radius: 16px;
      overflow: hidden;
      transition: opacity .25s ease, transform .25s ease;
    }

    .player-frame-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #050505;
    }

    .player-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .player-meta {
      padding: 12px 14px;
      border-top: 1px solid #1f1f1f;
    }

    .player-title {
      font-size: 15px;
      font-weight: 600;
      color: #f3f3f3;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .section-title-group { display: flex; align-items: center; gap: 12px; }
    .section-bar { width: 4px; height: 24px; background: #fff; border-radius: 2px; }
    .section-title { font-size: 1.08rem; font-weight: 600; color: #fff; }
    .section-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .clear-btn {
      font-size: 13px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color .15s;
    }
    .clear-btn:hover { color: #fff; }

    .status-message {
      margin: 4px 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #252525;
      background: #111;
      color: var(--muted);
      font-size: 14px;
    }
    .status-message.error {
      border-color: #4a1f1f;
      background: rgba(114, 26, 26, 0.2);
      color: #ffd1d1;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 14px;
    }
    @media (min-width: 560px) { .video-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .video-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
    @media (min-width: 1200px) { .video-grid { grid-template-columns: repeat(4, 1fr); } }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .25s, box-shadow .25s, transform .18s;
      text-align: left;
      color: inherit;
      width: 100%;
    }
    .video-card:hover {
      border-color: #404040;
      box-shadow: 0 10px 34px rgba(0,0,0,.5);
      transform: translateY(-2px);
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0d0d0d;
      overflow: hidden;
    }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .35s, filter .35s;
    }
    .video-card:hover .thumb-wrap img {
      transform: scale(1.04);
      filter: brightness(1.08);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .22s;
      background: linear-gradient(transparent, rgba(0,0,0,0.25));
    }
    .video-card:hover .play-overlay { opacity: 1; }
    .play-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .card-info { padding: 12px; }
    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .15s;
      margin-bottom: 2px;
      min-height: 40px;
    }
    .video-card:hover .card-title { color: #d7d7d7; }

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1a1a1a 25%, #262626 50%, #1a1a1a 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .skel-thumb { width: 100%; aspect-ratio: 16/9; }
    .skel-info { padding: 12px; display: grid; gap: 8px; }
    .skel-line { height: 13px; }
    .skel-line.full { width: 100%; }
    .skel-line.three-q { width: 75%; }


    .nav-btn {
      height: 40px;
      padding: 0 16px;
      background: #1f1f1f;
      border: 1px solid #343434;
      border-radius: 999px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: background .2s, border-color .2s;
    }
    .nav-btn:hover { background: #2a2a2a; border-color: #444; }

    .shorts-mode {
      max-width: 100%;
      padding: 0;
      margin: 0;
      height: calc(100vh - 65px);
      overflow: hidden;
      position: relative;
      background: #000;
    }

    .shorts-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 16px;
      display: flex;
      justify-content: flex-end;
      background: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.1));
    }

    .shorts-back-btn {
      height: 38px;
      padding: 0 14px;
      background: rgba(23,23,23,.95);
      border: 1px solid #3a3a3a;
      border-radius: 999px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .shorts-feed {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .short-item {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: #000;
      align-items: center;
      justify-content: center;
    }

    .short-item.active {
      display: flex;
    }

    .short-video-wrap {
      height: 100%;
      aspect-ratio: 9 / 16;
      max-width: 420px;
      width: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .short-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .short-overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 24px;
      pointer-events: none;
      text-shadow: 0 1px 10px rgba(0,0,0,.65);
    }

    .short-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .short-query { font-size: 13px; color: #d4d4d4; }


    .short-nav-btn {
      position: absolute;
      right: 16px;
      bottom: 80px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 12;
    }

    .short-nav-btn.up {
      bottom: 140px;
    }

    .shorts-loader { padding: 20px 16px 30px; display: grid; gap: 10px; background: #000; }
    .shorts-loader .skeleton { height: 18px; border-radius: 10px; }

    footer {
      margin-top: 56px;
      border-top: 1px solid #1a1a1a;
      padding: 28px 16px;
      text-align: center;
      color: #4a4a4a;
      font-size: 12px;
      font-family: serif;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <button class="logo" onclick="goHome()" aria-label="Go to home">𝕄𝕔ℂ𝕣𝕒𝕔𝕜Tube</button>
      <form class="search-form" id="searchForm" aria-label="Video search form">
        <input id="searchInput" class="search-input" type="text" placeholder="Search videos" autocomplete="off" aria-label="Search videos" />
        <button class="search-btn" type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </form>
      <button id="shortsModeBtn" class="nav-btn" type="button" aria-label="Open Shorts mode">Shorts</button>
    </div>
  </header>

  <main>
    <section id="playerSection" class="player-wrap hidden" aria-label="Video player section">
      <div class="player-frame-wrap">
        <iframe id="playerFrame" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
      <div class="player-meta">
        <div id="playerTitle" class="player-title"></div>
      </div>
    </section>

    <div id="statusMessage" class="status-message hidden" role="status" aria-live="polite"></div>

    <section id="loadingSection" class="hidden" aria-label="Loading results">
      <div class="section-header">
        <div class="section-title-group"><div class="section-bar"></div><div class="section-title" id="loadingLabel">Searching…</div></div>
      </div>
      <div id="loadingGrid" class="video-grid"></div>
    </section>

    <section id="resultsSection">
      <div class="section-header">
        <div class="section-title-group">
          <div class="section-bar"></div>
          <div>
            <div class="section-title" id="resultsLabel">Search videos</div>
            <div class="section-subtitle" id="resultsSubtitle">Type a query and press Enter.</div>
          </div>
        </div>
        <button class="clear-btn hidden" id="clearSearchBtn" onclick="goHome()" aria-label="Clear search">Clear search</button>
      </div>
      <div id="resultsGrid" class="video-grid"></div>
    </section>
  </main>


    <section id="shortsSection" class="shorts-mode hidden" aria-label="Shorts mode">
      <div class="shorts-topbar">
        <button id="backToVideosBtn" class="shorts-back-btn" type="button">Back to Videos</button>
      </div>
      <div id="shortsFeed" class="shorts-feed"></div>
      <button id="nextShortBtn" class="short-nav-btn" type="button" aria-label="Next short">↓</button>
      <button id="prevShortBtn" class="short-nav-btn up" type="button" aria-label="Previous short">↑</button>
      <div id="shortsLoader" class="shorts-loader hidden" aria-live="polite">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>

  <footer>𝕄𝕔ℂ𝕣𝕒𝕔𝕜Tube — Not affiliated with YouTube or Google.</footer>

  <script>
    const TRENDING_QUERIES = [
      "trending videos",
      "viral videos",
      "popular videos",
      "most viewed videos",
      "youtube trending",
      "top videos today"
    ];

    const PLAY_ICON = `<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>`;
    const resultsGrid = document.getElementById("resultsGrid");
    const loadingGrid = document.getElementById("loadingGrid");
    const loadingSection = document.getElementById("loadingSection");
    const loadingLabel = document.getElementById("loadingLabel");
    const statusMessage = document.getElementById("statusMessage");
    const resultsLabel = document.getElementById("resultsLabel");
    const resultsSubtitle = document.getElementById("resultsSubtitle");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const searchInput = document.getElementById("searchInput");
    const playerSection = document.getElementById("playerSection");
    const playerFrame = document.getElementById("playerFrame");
    const playerTitle = document.getElementById("playerTitle");
    const shortsModeBtn = document.getElementById("shortsModeBtn");
    const backToVideosBtn = document.getElementById("backToVideosBtn");
    const shortsSection = document.getElementById("shortsSection");
    const shortsFeed = document.getElementById("shortsFeed");
    const shortsLoader = document.getElementById("shortsLoader");
    const mainEl = document.querySelector("main");
    const footerEl = document.querySelector("footer");

    const SHORTS_QUERIES = ["youtube shorts", "viral shorts", "short funny videos", "quick clips", "meme shorts", "trending short videos"];
    let shortsCursor = 0;
    let shortsLoading = false;
    let shortsModeActive = false;
    let currentShortIndex = 0;
    const shortsSeenIds = new Set();

    function showStatus(message, isError = false) {
      statusMessage.textContent = message;
      statusMessage.classList.remove("hidden", "error");
      if (isError) statusMessage.classList.add("error");
    }

    function hideStatus() {
      statusMessage.classList.add("hidden");
      statusMessage.textContent = "";
      statusMessage.classList.remove("error");
    }

    function sanitizeVideos(data) {
      if (!Array.isArray(data)) return [];
      return data.filter((video) => video && video.id && video.title && video.thumbnail);
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    async function fetchVideos(query) {
      const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
      if (!response.ok) throw new Error("Search request failed");
      return sanitizeVideos(await response.json());
    }

    function makeCard(video) {
      const btn = document.createElement("button");
      btn.className = "video-card";
      btn.type = "button";
      btn.setAttribute("aria-label", `Play ${video.title}`);

      const thumbWrap = document.createElement("div");
      thumbWrap.className = "thumb-wrap";

      const img = document.createElement("img");
      img.src = video.thumbnail;
      img.alt = `Thumbnail for ${video.title}`;
      img.loading = "lazy";

      const overlay = document.createElement("div");
      overlay.className = "play-overlay";
      const circle = document.createElement("div");
      circle.className = "play-circle";
      circle.innerHTML = PLAY_ICON;
      overlay.appendChild(circle);

      thumbWrap.append(img, overlay);

      const info = document.createElement("div");
      info.className = "card-info";
      const title = document.createElement("div");
      title.className = "card-title";
      title.textContent = video.title;
      info.appendChild(title);

      btn.append(thumbWrap, info);
      btn.addEventListener("click", () => playVideo(video));
      return btn;
    }

    function makeSkeleton() {
      const div = document.createElement("div");
      div.className = "skel-card";
      div.innerHTML = `<div class="skel-thumb skeleton"></div><div class="skel-info"><div class="skel-line full skeleton"></div><div class="skel-line three-q skeleton"></div></div>`;
      return div;
    }

    function renderGrid(container, videos) {
      container.innerHTML = "";
      videos.forEach((video) => container.appendChild(makeCard(video)));
    }

    function renderSkeletons(container, count = 8) {
      container.innerHTML = "";
      for (let i = 0; i < count; i += 1) container.appendChild(makeSkeleton());
    }

    function playVideo(video) {
      playerFrame.src = `https://www.youtube.com/embed/${encodeURIComponent(video.id)}?autoplay=1&rel=0`;
      playerTitle.textContent = video.title;
      playerSection.classList.remove("hidden");
      playerSection.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function setTrendingHeadings(queryUsed = "") {
      resultsLabel.textContent = "Trending Now";
      resultsSubtitle.textContent = queryUsed ? `Powered by: ${queryUsed}` : "Popular videos right now.";
    }



    function getNextShortQuerySet(batchSize = 3) {
      const rotated = [];
      for (let i = 0; i < batchSize; i += 1) {
        rotated.push(SHORTS_QUERIES[(shortsCursor + i) % SHORTS_QUERIES.length]);
      }
      shortsCursor = (shortsCursor + batchSize) % SHORTS_QUERIES.length;
      return shuffle(rotated);
    }

    function stopAllShortsPlayback() {
      shortsFeed.querySelectorAll("iframe").forEach((frame) => {
        frame.src = frame.dataset.baseSrc || frame.src;
      });
    }

    function activateShortFrame(item) {
      const current = item?.querySelector("iframe");
      if (!current) return;
      shortsFeed.querySelectorAll("iframe").forEach((frame) => {
        if (frame === current) {
          frame.src = `${frame.dataset.baseSrc}&autoplay=1`;
        } else {
          frame.src = frame.dataset.baseSrc;
        }
      });
    }

    function createShortItem(video) {
      const item = document.createElement("article");
      item.className = "short-item";

      const frame = document.createElement("iframe");
      frame.className = "short-frame";
      frame.title = video.title;
      frame.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      frame.allowFullscreen = true;
      frame.loading = "lazy";
      frame.dataset.baseSrc = `https://www.youtube.com/embed/${encodeURIComponent(video.id)}?mute=1&controls=0&rel=0&playsinline=1&loop=1&playlist=${encodeURIComponent(video.id)}`;
      frame.src = frame.dataset.baseSrc;

      const overlay = document.createElement("div");
      overlay.className = "short-overlay";
      overlay.innerHTML = `<div class="short-title">${video.title}</div><div class="short-query">From: ${video.sourceQuery}</div>`;

      const videoWrap = document.createElement("div");
      videoWrap.className = "short-video-wrap";
      videoWrap.appendChild(frame);

      item.append(videoWrap, overlay);
      return item;
    }

    function showShort(index) {
      const items = shortsFeed.children;

      if (!items.length) return;

      if (index < 0) index = 0;

      if (index >= items.length) {
        loadMoreShorts(6);
        return;
      }

      Array.from(items).forEach((item) => item.classList.remove("active"));

      const activeItem = items[index];
      activeItem.classList.add("active");

      activateShortFrame(activeItem);
      currentShortIndex = index;
    }

    async function loadMoreShorts(batchTarget = 8) {
      if (shortsLoading) return;
      shortsLoading = true;
      shortsLoader.classList.remove("hidden");
      try {
        const queries = getNextShortQuerySet(3);
        const responses = await Promise.all(queries.map(async (query) => ({ query, videos: await fetchVideos(query) })));
        const mixed = [];
        responses.forEach(({ query, videos }) => {
          videos.forEach((video) => mixed.push({ ...video, sourceQuery: query }));
        });

        const unique = shuffle(mixed).filter((video) => {
          if (shortsSeenIds.has(video.id)) return false;
          shortsSeenIds.add(video.id);
          return true;
        }).slice(0, batchTarget);

        unique.forEach((video) => shortsFeed.appendChild(createShortItem(video)));

        if (shortsFeed.children.length === unique.length) {
          showShort(0);
        }

      } catch (error) {
        showStatus("Could not load more Shorts right now.", true);
      } finally {
        shortsLoading = false;
        shortsLoader.classList.add("hidden");
      }
    }

    async function enterShortsMode() {
      shortsModeActive = true;
      hideStatus();
      playerSection.classList.add("hidden");
      playerFrame.src = "";
      resultsSection.classList.add("hidden");
      loadingSection.classList.add("hidden");
      shortsSection.classList.remove("hidden");
      footerEl.classList.add("hidden");
      document.body.style.overflow = "hidden";
      if (shortsFeed.children.length === 0) {
        await loadMoreShorts(8);
      }
      if (shortsFeed.children.length > 0) {
        showShort(currentShortIndex);
      }
    }

    function exitShortsMode() {
      shortsModeActive = false;
      shortsSection.classList.add("hidden");
      footerEl.classList.remove("hidden");
      document.body.style.overflow = "";
      stopAllShortsPlayback();
      goHome();
    }

    async function loadTrending() {
      hideStatus();
      clearSearchBtn.classList.add("hidden");
      loadingSection.classList.remove("hidden");
      loadingLabel.textContent = "Loading trending videos…";
      renderSkeletons(loadingGrid, 8);

      const phrases = shuffle(TRENDING_QUERIES);
      let videos = [];
      let queryUsed = "";

      for (const phrase of phrases) {
        try {
          const result = await fetchVideos(phrase);
          if (result.length > 0) {
            videos = result;
            queryUsed = phrase;
            break;
          }
        } catch (error) {
          // Continue trying fallback phrases.
        }
      }

      loadingSection.classList.add("hidden");

      if (videos.length === 0) {
        resultsGrid.innerHTML = "";
        setTrendingHeadings();
        showStatus("Could not load trending videos right now. Try searching for something.", true);
        return;
      }

      setTrendingHeadings(queryUsed);
      renderGrid(resultsGrid, videos);
    }

    async function goHome() {
      searchInput.value = "";
      await loadTrending();
    }


    function extractYouTubeId(input) {
      try {
        const url = new URL(input);

        // youtube.com/watch?v=VIDEO_ID
        if (url.hostname.includes("youtube.com")) {
          return url.searchParams.get("v");
        }

        // youtu.be/VIDEO_ID
        if (url.hostname === "youtu.be") {
          return url.pathname.slice(1);
        }
      } catch (e) {
        // Not a valid URL → ignore
      }

      return null;
    }

    async function doSearch(event) {
      event.preventDefault();
      const query = searchInput.value.trim();
      if (!query) {
        await goHome();
        return;
      }

      // 🔥 NEW: check if it's a YouTube URL
      const videoId = extractYouTubeId(query);

      if (videoId) {
        playVideo({
          id: videoId,
          title: "Direct Video"
        });

        return; // stop normal search
      }

      hideStatus();
      clearSearchBtn.classList.remove("hidden");
      loadingSection.classList.remove("hidden");
      loadingLabel.textContent = `Searching for "${query}"…`;
      renderSkeletons(loadingGrid, 8);

      try {
        const videos = await fetchVideos(query);
        loadingSection.classList.add("hidden");

        if (videos.length === 0) {
          resultsGrid.innerHTML = "";
          resultsLabel.textContent = `Results for "${query}"`;
          resultsSubtitle.textContent = "No videos found. Try a different keyword.";
          showStatus("No videos found.");
          return;
        }

        resultsLabel.textContent = `Results for "${query}"`;
        resultsSubtitle.textContent = `${videos.length} video${videos.length === 1 ? "" : "s"} found`;
        renderGrid(resultsGrid, videos);
      } catch (error) {
        loadingSection.classList.add("hidden");
        resultsGrid.innerHTML = "";
        resultsLabel.textContent = "Search unavailable";
        resultsSubtitle.textContent = "Please try again in a moment.";
        showStatus("Could not load videos from backend. Please try again.", true);
      }
    }

    document.getElementById("searchForm").addEventListener("submit", doSearch);
    shortsModeBtn.addEventListener("click", enterShortsMode);
    backToVideosBtn.addEventListener("click", exitShortsMode);
    document.getElementById("nextShortBtn").addEventListener("click", () => {
      showShort(currentShortIndex + 1);
    });
    document.getElementById("prevShortBtn").addEventListener("click", () => {
      showShort(currentShortIndex - 1);
    });
    window.addEventListener("DOMContentLoaded", loadTrending);
  </script>
</body>
</html>
