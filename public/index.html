<!DOCTYPE html>
<html>
<head>
<title>McCrackTube</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#fff);
color:white;
text-align:center;
}
h1{margin-top:20px;}
input{padding:10px;width:60%;}
button{padding:10px;}
#results{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:20px;}
.card{background:rgba(0,0,0,.7);padding:10px;border-radius:12px;cursor:pointer;}
.card img{width:100%;}
</style>
</head>
<body>

<h1>MCCRACKTUBE</h1>

<input id="searchBox" placeholder="Search...">
<button onclick="search()">Search</button>

<div id="player"></div>
<div id="results"></div>

<script>
async function search(){
 const q = document.getElementById("searchBox").value;
 const res = await fetch("/search?q=" + encodeURIComponent(q));
 const data = await res.json();

 const results = document.getElementById("results");
 results.innerHTML = "";

 data.forEach(video => {
   const div = document.createElement("div");
   div.className = "card";
   div.innerHTML = `
     <img src="${video.thumbnail}">
     <p>${video.title}</p>
   `;
   div.onclick = () => play(video.id);
   results.appendChild(div);
 });
}

function play(id){
 document.getElementById("player").innerHTML = `
 <iframe width="80%" height="400"
 src="https://www.youtube.com/embed/${id}"
 allowfullscreen></iframe>`;
}
</script>

</body>
</html>
